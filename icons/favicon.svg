<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0056CC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Clock face -->
  <circle cx="256" cy="268" r="155" fill="none" stroke="white" stroke-width="14" opacity="0.25"/>
  <!-- Progress arc (75% complete) -->
  <path d="M256 113 A155 155 0 1 1 146.4 350.6" fill="none" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- Clock hands -->
  <line x1="256" y1="268" x2="256" y2="168" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <line x1="256" y1="268" x2="320" y2="296" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <!-- Center dot -->
  <circle cx="256" cy="268" r="10" fill="white"/>
  <!-- Checkmark badge -->
  <circle cx="370" cy="148" r="52" fill="#34C759"/>
  <polyline points="345,148 362,165 395,132" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
